<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Payment Success Redirect</title>
</head>
<body>
    <script>
        // Redirecting back to app after success
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        window.location.href = "tracksapp://verify-success?userId=" + userId;
    </script>
    <h2>Redirecting to App...</h2>
</body>
</html>
